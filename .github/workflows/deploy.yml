name: Deploy to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: bookrank
  ECS_SERVICE: bookrank-service
  ECS_CLUSTER: bookrank-cluster
  CONTAINER_NAME: bookrank-app

jobs:
  # Deploy to staging on main branch, production on manual trigger
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}
      url: ${{ steps.deploy.outputs.service-url }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set environment variables
      run: |
        if [ "${{ github.event.inputs.environment }}" == "production" ] || [ "${{ github.ref }}" == "refs/heads/main" ]; then
          if [ "${{ github.event.inputs.environment }}" == "production" ]; then
            echo "DEPLOY_ENV=production" >> $GITHUB_ENV
            echo "ECS_CLUSTER=bookrank-prod-cluster" >> $GITHUB_ENV
            echo "ECS_SERVICE=bookrank-prod-service" >> $GITHUB_ENV
          else
            echo "DEPLOY_ENV=staging" >> $GITHUB_ENV
            echo "ECS_CLUSTER=bookrank-staging-cluster" >> $GITHUB_ENV
            echo "ECS_SERVICE=bookrank-staging-service" >> $GITHUB_ENV
          fi
        fi

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up Node.js for frontend build
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build frontend
      working-directory: frontend
      run: |
        npm ci
        npm run build

    - name: Build, tag, and push Docker image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Build the Docker image
        docker build -f Dockerfile.production -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .

        # Also tag as latest for the environment
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$DEPLOY_ENV-latest

        # Push both tags
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$DEPLOY_ENV-latest

        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Download task definition
      run: |
        aws ecs describe-task-definition \
          --task-definition $ECS_SERVICE-$DEPLOY_ENV \
          --query taskDefinition > task-definition.json

    - name: Update ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json
        container-name: ${{ env.CONTAINER_NAME }}
        image: ${{ steps.build-image.outputs.image }}

    - name: Deploy to Amazon ECS
      id: deploy
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: ${{ env.ECS_SERVICE }}-${{ env.DEPLOY_ENV }}
        cluster: ${{ env.ECS_CLUSTER }}
        wait-for-service-stability: true

    - name: Get service URL
      id: service-url
      run: |
        # Get the load balancer DNS name
        LB_DNS=$(aws elbv2 describe-load-balancers \
          --query "LoadBalancers[?contains(LoadBalancerName, '$DEPLOY_ENV')].DNSName" \
          --output text)

        if [ "$DEPLOY_ENV" == "production" ]; then
          SERVICE_URL="https://bookrank.yourdomain.com"
        else
          SERVICE_URL="https://$LB_DNS"
        fi

        echo "service-url=$SERVICE_URL" >> $GITHUB_OUTPUT
        echo "Deployed to: $SERVICE_URL"

    - name: Run smoke tests
      env:
        SERVICE_URL: ${{ steps.service-url.outputs.service-url }}
      run: |
        # Wait for deployment to be ready
        sleep 30

        # Test health endpoint
        curl -f $SERVICE_URL/health || exit 1

        # Test API endpoints
        curl -f $SERVICE_URL/api/v1/books || echo "API endpoint test (expected to need auth)"

        echo "Smoke tests passed!"

    - name: Notify deployment status
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: |
          Deployment to ${{ env.DEPLOY_ENV }} ${{ job.status }}!
          Service URL: ${{ steps.service-url.outputs.service-url }}
          Commit: ${{ github.sha }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Database migration job (runs after successful deployment)
  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    environment:
      name: ${{ github.event.inputs.environment || 'staging' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set environment variables
      run: |
        if [ "${{ github.event.inputs.environment }}" == "production" ]; then
          echo "DEPLOY_ENV=production" >> $GITHUB_ENV
        else
          echo "DEPLOY_ENV=staging" >> $GITHUB_ENV
        fi

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Run database migrations
      run: |
        # Get RDS endpoint from AWS
        RDS_ENDPOINT=$(aws rds describe-db-instances \
          --db-instance-identifier bookrank-$DEPLOY_ENV-db \
          --query 'DBInstances[0].Endpoint.Address' \
          --output text)

        # Run migrations using ECS task
        aws ecs run-task \
          --cluster bookrank-$DEPLOY_ENV-cluster \
          --task-definition bookrank-migrate-$DEPLOY_ENV \
          --launch-type FARGATE \
          --network-configuration "awsvpcConfiguration={subnets=[subnet-xxx,subnet-yyy],securityGroups=[sg-xxx],assignPublicIp=ENABLED}" \
          --overrides '{
            "containerOverrides": [{
              "name": "migrate",
              "environment": [
                {"name": "DB_HOST", "value": "'$RDS_ENDPOINT'"},
                {"name": "ENVIRONMENT", "value": "'$DEPLOY_ENV'"}
              ]
            }]
          }'

        echo "Migration task started"