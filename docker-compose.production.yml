version: '3.8'

services:
  # Application Load Balancer (nginx)
  load-balancer:
    image: nginx:1.25-alpine
    container_name: bookrank-lb
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/configs/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/configs/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - bookrank-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # BookRank Application (multiple instances for load balancing)
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    deploy:
      replicas: 2
    environment:
      # Database Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-bookrank}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB:-bookrank}
      DB_SSL_MODE: require
      DB_MAX_OPEN_CONNS: 50
      DB_MAX_IDLE_CONNS: 10
      DB_CONN_MAX_LIFETIME: 1h
      DB_CONN_MAX_IDLE_TIME: 10m

      # Server Configuration
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      SERVER_READ_TIMEOUT: 30s
      SERVER_WRITE_TIMEOUT: 30s
      SERVER_IDLE_TIMEOUT: 120s

      # Authentication Configuration
      JWT_SECRET: ${JWT_SECRET}
      TOKEN_EXPIRATION: 24h
      BCRYPT_COST: 12
      RATE_LIMIT_PER_MINUTE: 100

      # Redis Configuration
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}

      # Cache Configuration
      CACHE_RECOMMENDATION_TTL: 1h
      CACHE_DEFAULT_TTL: 30m

      # Application Configuration
      ENVIRONMENT: production
      LOG_LEVEL: info
      LOG_FORMAT: json

      # Static files
      STATIC_FILES_PATH: /static

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bookrank-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/bookrank", "-health-check"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # PostgreSQL Database with backup
  postgres:
    image: postgres:16-alpine
    container_name: bookrank-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bookrank}
      POSTGRES_USER: ${POSTGRES_USER:-bookrank}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:5432:5432"  # Bind to localhost only
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
      - ./deployment/configs/postgres-init:/docker-entrypoint-initdb.d:ro
      - postgres_backups:/backups
    command: >
      postgres
      -c shared_preload_libraries=pg_stat_statements
      -c pg_stat_statements.track=all
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=4MB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      -c log_statement=mod
      -c log_min_duration_statement=1000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bookrank} -d ${POSTGRES_DB:-bookrank}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - bookrank-network
    restart: unless-stopped

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: bookrank-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --auto-aof-rewrite-percentage 100
      --auto-aof-rewrite-min-size 64mb
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"  # Bind to localhost only
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - bookrank-network
    restart: unless-stopped

  # Database backup service
  backup:
    image: postgres:16-alpine
    container_name: bookrank-backup
    environment:
      PGUSER: ${POSTGRES_USER:-bookrank}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB:-bookrank}
      PGHOST: postgres
    volumes:
      - postgres_backups:/backups
      - ./scripts/deployment/backup.sh:/backup.sh:ro
    command: >
      sh -c "
        while true; do
          echo 'Running backup at $(date)'
          /backup.sh
          echo 'Backup completed, sleeping for 6 hours'
          sleep 21600
        done
      "
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - bookrank-network
    restart: unless-stopped

  # Monitoring with Prometheus metrics
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: bookrank-prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./deployment/configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.route-prefix=/'
    networks:
      - bookrank-network
    restart: unless-stopped

volumes:
  postgres_data:
  postgres_backups:
  redis_data:
  prometheus_data:

networks:
  bookrank-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16